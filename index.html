<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ram's Study Dashboard — IB Finals 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --bg2: #16161c;
    --bg3: #1e1e26;
    --bg4: #26262f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f4;
    --text2: #9090a0;
    --text3: #5a5a6a;
    --accent: #7c6ff7;
    --accent2: #a89ff9;
    --cs: #4da6ff;
    --physics: #5ecb7a;
    --math: #f5a623;
    --econ: #f06292;
    --english: #ce93d8;
    --spanish: #4dd0c4;
    --general: #90a0b0;
    --danger: #ff6b6b;
    --warn: #ffb347;
    --success: #5ecb7a;
    --rad: 10px;
    --rad-lg: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

  /* ── Layout ── */
  .shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 28px 0;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .logo {
    padding: 0 20px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .logo-name { font-size: 16px; font-weight: 600; color: var(--text); }
  .logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }

  .nav-section { padding: 0 12px; margin-bottom: 6px; }
  .nav-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 0 8px; margin-bottom: 4px; }
  .nav-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: var(--rad);
    cursor: pointer; border: none; background: transparent;
    color: var(--text2); font-size: 13px; font-family: 'DM Sans', sans-serif;
    width: 100%; text-align: left; transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--bg3); color: var(--text); }
  .nav-btn.active { background: rgba(124,111,247,0.15); color: var(--accent2); }
  .nav-btn .icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
  .nav-btn.active .icon { opacity: 1; }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px 20px 0;
    border-top: 1px solid var(--border);
  }
  .countdown-big {
    background: linear-gradient(135deg, rgba(255,107,107,0.15), rgba(255,107,107,0.05));
    border: 1px solid rgba(255,107,107,0.25);
    border-radius: var(--rad);
    padding: 12px 14px;
    text-align: center;
  }
  .countdown-num { font-size: 32px; font-weight: 600; color: var(--danger); font-family: 'DM Mono', monospace; }
  .countdown-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

  /* ── Main ── */
  .main { padding: 32px; overflow-y: auto; }

  .page-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 28px; gap: 16px; flex-wrap: wrap;
  }
  .page-title { font-size: 22px; font-weight: 600; color: var(--text); }
  .page-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }

  .phase-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 500;
  }

  /* ── Views ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── Stats row ── */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--rad-lg); padding: 16px 18px;
  }
  .stat-card-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-card-val { font-size: 28px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
  .stat-card-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }

  /* ── Today card ── */
  .today-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--rad-lg); overflow: hidden; margin-bottom: 16px;
  }
  .today-head {
    padding: 14px 18px;
    background: rgba(124,111,247,0.1);
    border-bottom: 1px solid rgba(124,111,247,0.2);
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  .today-date { font-size: 15px; font-weight: 600; color: var(--accent2); }
  .today-count { font-size: 11px; color: var(--text2); }

  .task-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: var(--bg3); }
  .task-item.done { opacity: 0.4; }
  .task-item.done .task-text { text-decoration: line-through; }

  .checkbox {
    width: 18px; height: 18px; border-radius: 5px;
    border: 1.5px solid var(--border2); flex-shrink: 0;
    margin-top: 1px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .checkbox.checked { background: var(--accent); border-color: var(--accent); }
  .checkbox svg { display: none; }
  .checkbox.checked svg { display: block; }

  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 13px; color: var(--text); line-height: 1.45; }
  .task-hint { font-size: 11px; color: var(--text3); margin-top: 3px; font-style: italic; }

  .subj-tag {
    display: inline-block; font-size: 10px; font-weight: 500;
    padding: 2px 8px; border-radius: 20px; margin-right: 6px;
    font-family: 'DM Mono', monospace; vertical-align: middle;
  }

  /* ── Calendar ── */
  .cal-container { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
  .cal-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rad-lg); padding: 20px; }
  .cal-nav-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-month-label { font-size: 15px; font-weight: 600; color: var(--text); }
  .cal-nav-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 5px 12px; border-radius: var(--rad); font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .cal-nav-btn:hover { background: var(--bg4); color: var(--text); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-day-header { text-align: center; font-size: 10px; color: var(--text3); padding: 6px 0; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .cal-cell {
    border-radius: 8px; padding: 6px 4px; text-align: center;
    cursor: pointer; border: 1px solid transparent; min-height: 52px;
    transition: all 0.12s; position: relative;
  }
  .cal-cell:hover:not(.empty) { border-color: var(--border2); background: var(--bg3); }
  .cal-cell.today { border-color: var(--accent); background: rgba(124,111,247,0.1); }
  .cal-cell.selected { border-color: var(--accent2); background: rgba(124,111,247,0.15); }
  .cal-cell.past { opacity: 0.35; }
  .cal-cell.study-leave { background: rgba(245,166,35,0.1); border-color: rgba(245,166,35,0.2); }
  .cal-cell.exam-day { background: rgba(255,107,107,0.1); border-color: rgba(255,107,107,0.2); }
  .cal-cell.empty { cursor: default; }
  .cal-num { font-size: 12px; font-weight: 500; color: var(--text); }
  .cal-dots { display: flex; justify-content: center; gap: 2px; margin-top: 4px; flex-wrap: wrap; }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
  .cal-legend { display: flex; gap: 14px; margin-top: 12px; flex-wrap: wrap; }
  .cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .cal-legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  .day-detail {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--rad-lg); overflow: hidden; height: fit-content;
  }
  .day-detail-head {
    padding: 14px 16px; background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }
  .day-detail-date { font-size: 14px; font-weight: 600; color: var(--text); }
  .day-detail-phase { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* ── Subject view ── */
  .subj-section { margin-bottom: 20px; }
  .subj-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    padding: 12px 16px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--rad) var(--rad) 0 0;
    cursor: pointer; user-select: none;
  }
  .subj-header-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .subj-header-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
  .subj-header-count { font-size: 11px; color: var(--text2); }
  .subj-header-arrow { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
  .subj-header.collapsed .subj-header-arrow { transform: rotate(-90deg); }
  .subj-body {
    background: var(--bg2); border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 var(--rad) var(--rad);
    overflow: hidden;
  }
  .subj-body.hidden { display: none; }
  .subj-day-label {
    padding: 6px 16px; font-size: 10px; color: var(--text3);
    background: var(--bg3); border-bottom: 1px solid var(--border);
    text-transform: uppercase; letter-spacing: 0.05em;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Progress ── */
  .prog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .prog-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rad-lg); padding: 20px; }
  .prog-card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
  .prog-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
  .prog-label { font-size: 12px; color: var(--text2); width: 80px; flex-shrink: 0; }
  .prog-bar-track { flex: 1; background: var(--bg4); border-radius: 4px; height: 7px; overflow: hidden; }
  .prog-bar-fill { height: 7px; border-radius: 4px; transition: width 0.4s ease; }
  .prog-pct { font-size: 11px; color: var(--text3); width: 32px; text-align: right; font-family: 'DM Mono', monospace; }
  .overall-ring { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 0 20px; }
  .ring-num { font-size: 48px; font-weight: 600; color: var(--accent2); font-family: 'DM Mono', monospace; line-height: 1; }
  .ring-label { font-size: 12px; color: var(--text2); margin-top: 6px; }
  .ring-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* ── Filter chips ── */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip {
    padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border2);
    background: transparent; color: var(--text2); transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .chip:hover { background: var(--bg3); color: var(--text); }
  .chip.active { color: #fff; border-color: transparent; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--rad); padding: 10px 16px;
    font-size: 12px; color: var(--text);
    opacity: 0; transform: translateY(8px);
    transition: all 0.2s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; flex-direction: row; flex-wrap: wrap; padding: 16px; gap: 8px; }
    .logo { padding: 0; border: none; margin: 0; flex-basis: 100%; }
    .nav-section { padding: 0; }
    .nav-label { display: none; }
    .nav-btn { padding: 7px 12px; }
    .sidebar-footer { display: none; }
    .main { padding: 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .cal-container { grid-template-columns: 1fr; }
    .prog-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-name">Ram Mostafa Ali</div>
      <div class="logo-sub">IB DP1 · EMIS · Finals 2026</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Views</div>
      <button class="nav-btn active" onclick="showView('today', this)">
        <svg class="icon" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" fill="currentColor"/><rect x="9" y="2" width="5" height="5" rx="1" fill="currentColor" opacity="0.5"/><rect x="2" y="9" width="5" height="5" rx="1" fill="currentColor" opacity="0.5"/><rect x="9" y="9" width="5" height="5" rx="1" fill="currentColor" opacity="0.5"/></svg>
        Today
      </button>
      <button class="nav-btn" onclick="showView('calendar', this)">
        <svg class="icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 1v4M11 1v4M1 7h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Calendar
      </button>
      <button class="nav-btn" onclick="showView('subjects', this)">
        <svg class="icon" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        By subject
      </button>
      <button class="nav-btn" onclick="showView('progress', this)">
        <svg class="icon" viewBox="0 0 16 16" fill="none"><path d="M2 12 L5 8 L8 10 L11 5 L14 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Progress
      </button>
    </div>

    <div class="nav-section" style="margin-top:12px;">
      <div class="nav-label">Subjects</div>
      <button class="nav-btn" onclick="showView('subjects', this); filterSubject('cs')" style="color:var(--cs)">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--cs);flex-shrink:0;"></div> CS
      </button>
      <button class="nav-btn" onclick="showView('subjects', this); filterSubject('physics')" style="color:var(--physics)">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--physics);flex-shrink:0;"></div> Physics
      </button>
      <button class="nav-btn" onclick="showView('subjects', this); filterSubject('math')" style="color:var(--math)">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--math);flex-shrink:0;"></div> Math
      </button>
      <button class="nav-btn" onclick="showView('subjects', this); filterSubject('econ')" style="color:var(--econ)">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--econ);flex-shrink:0;"></div> Econ
      </button>
      <button class="nav-btn" onclick="showView('subjects', this); filterSubject('english')" style="color:var(--english)">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--english);flex-shrink:0;"></div> English
      </button>
      <button class="nav-btn" onclick="showView('subjects', this); filterSubject('spanish')" style="color:var(--spanish)">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--spanish);flex-shrink:0;"></div> Spanish
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="countdown-big">
        <div class="countdown-num" id="sb-countdown">35</div>
        <div class="countdown-label">days to exams</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Today view -->
    <div id="view-today" class="view active">
      <div class="page-header">
        <div>
          <div class="page-title" id="today-title">Today</div>
          <div class="page-sub">Tap tasks to check them off as you finish</div>
        </div>
        <div id="today-phase-badge"></div>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
      <div id="today-tasks"></div>
    </div>

    <!-- Calendar view -->
    <div id="view-calendar" class="view">
      <div class="page-header">
        <div>
          <div class="page-title">Calendar</div>
          <div class="page-sub">Click any day to see its tasks</div>
        </div>
      </div>
      <div class="cal-container">
        <div>
          <div class="cal-wrap">
            <div class="cal-nav-row">
              <button class="cal-nav-btn" onclick="calPrev()">← prev</button>
              <span class="cal-month-label" id="cal-month-label"></span>
              <button class="cal-nav-btn" onclick="calNext()">next →</button>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
            <div class="cal-legend">
              <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(124,111,247,0.3);border:1px solid var(--accent)"></div>Today</div>
              <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(245,166,35,0.2)"></div>Study leave</div>
              <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(255,107,107,0.2)"></div>Exams</div>
            </div>
          </div>
        </div>
        <div class="day-detail" id="day-detail"></div>
      </div>
    </div>

    <!-- Subjects view -->
    <div id="view-subjects" class="view">
      <div class="page-header">
        <div>
          <div class="page-title">By subject</div>
          <div class="page-sub">All tasks grouped by subject</div>
        </div>
      </div>
      <div class="filter-row" id="subj-filter-row"></div>
      <div id="subjects-content"></div>
    </div>

    <!-- Progress view -->
    <div id="view-progress" class="view">
      <div class="page-header">
        <div>
          <div class="page-title">Progress</div>
          <div class="page-sub">Track how far you've come</div>
        </div>
      </div>
      <div class="prog-grid" id="prog-grid"></div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const TODAY = new Date(2026, 3, 12);
const EXAM_START = new Date(2026, 4, 17);
const STUDY_LEAVE_START = new Date(2026, 4, 12);

const SC = {
  cs:      { label: 'CS',      color: '#4da6ff', bg: 'rgba(77,166,255,0.12)', text: '#4da6ff' },
  physics: { label: 'Physics', color: '#5ecb7a', bg: 'rgba(94,203,122,0.12)', text: '#5ecb7a' },
  math:    { label: 'Math',    color: '#f5a623', bg: 'rgba(245,166,35,0.12)', text: '#f5a623' },
  econ:    { label: 'Econ',    color: '#f06292', bg: 'rgba(240,98,146,0.12)', text: '#f06292' },
  english: { label: 'English', color: '#ce93d8', bg: 'rgba(206,147,216,0.12)', text: '#ce93d8' },
  spanish: { label: 'Spanish', color: '#4dd0c4', bg: 'rgba(77,208,196,0.12)', text: '#4dd0c4' },
  all:     { label: 'General', color: '#90a0b0', bg: 'rgba(144,160,176,0.12)', text: '#90a0b0' },
};

const PHASES = [
  { name: 'Foundation', color: 'rgba(124,111,247,0.15)', text: '#a89ff9', border: 'rgba(124,111,247,0.3)' },
  { name: 'Build',      color: 'rgba(94,203,122,0.12)',  text: '#5ecb7a', border: 'rgba(94,203,122,0.25)' },
  { name: 'Intensify',  color: 'rgba(245,166,35,0.12)',  text: '#f5a623', border: 'rgba(245,166,35,0.25)' },
  { name: 'Study leave',color: 'rgba(255,107,107,0.12)', text: '#ff8a8a', border: 'rgba(255,107,107,0.25)' },
];

function mkD(y, m, d) { return new Date(y, m - 1, d); }
function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

const DAYS_DATA = [
  { d: mkD(2026,4,12), phase: 0, tasks: [
    { subj:'cs',      text:'OOP basics: class, object, method, attribute', note:'Watch a 20min explainer — concept before code', id:'t001' },
    { subj:'math',    text:'Algebraic fractions: simplify, add, multiply', note:'Khan Academy — 10 practice problems', id:'t002' },
  ]},
  { d: mkD(2026,4,13), phase: 0, tasks: [
    { subj:'cs',      text:'OOP: write your first class — Student with name, grade, methods', note:"Type it out, don't copy-paste", id:'t003' },
    { subj:'physics', text:"Mechanics: Newton's 3 laws + free body diagrams", note:'Draw diagrams for 5 different scenarios', id:'t004' },

const checked = JSON.parse(localStorage.getItem('ram_checked') || '{}');
let calYear = 2026, calMonth = 3;
let selectedDate = new Date(TODAY);
let activeSubjectFilter = 'all';
let collapsedSubjects = {};

function saveChecked() {
  localStorage.setItem('ram_checked', JSON.stringify(checked));
}

function toggleTask(id) {
  checked[id] = !checked[id];
  saveChecked();
  renderAll();
  showToast(checked[id] ? 'Task completed!' : 'Task unchecked');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── HELPERS ────────────────────────────────────────────────────────────────

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAY_NAMES   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_SHORT   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function getDayData(date) {
  return DAYS_DATA.find(x => sameDay(x.d, date));
}
function totalTasks()  { return DAYS_DATA.reduce((a, d) => a + d.tasks.length, 0); }
function doneTasks()   { return Object.values(checked).filter(Boolean).length; }
function daysLeft()    { return Math.max(0, Math.ceil((EXAM_START - TODAY) / 86400000)); }

function pill(subj) {
  const s = SC[subj] || SC.all;
  return `<span class="subj-tag" style="background:${s.bg};color:${s.text}">${s.label}</span>`;
}

function taskHTML(task) {
  const done = checked[task.id] || false;
  return `
    <div class="task-item ${done ? 'done' : ''}" onclick="toggleTask('${task.id}')">
      <div class="checkbox ${done ? 'checked' : ''}">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="task-body">
        <div class="task-text">${pill(task.subj)}${task.text}</div>
        ${task.note ? `<div class="task-hint">${task.note}</div>` : ''}
      </div>
    </div>`;
}

// ─── CALENDAR VIEW ───────────────────────────────────────────────────────────

function renderCalendar() {
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  document.getElementById('cal-month-label').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;

  let html = DAY_SHORT.map(d => `<div class="cal-day-header">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-cell empty"></div>`;

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(calYear, calMonth, day);
    const dayData = getDayData(date);
    const isToday = sameDay(date, TODAY);
    const isPast = date < TODAY && !isToday;
    const isExam = date >= EXAM_START;
    const isLeave = date >= STUDY_LEAVE_START && date < EXAM_START;
    const isSel = sameDay(date, selectedDate);

    let cls = 'cal-cell';
    if (isExam) cls += ' exam-day';
    else if (isLeave) cls += ' study-leave';
    if (isToday) cls += ' today';
    else if (isSel && !isExam) cls += ' selected';
    if (isPast) cls += ' past';

    let dots = '';
    if (dayData) {
      const seen = {};
      dayData.tasks.forEach(t => {
        if (!seen[t.subj]) {
          seen[t.subj] = true;
          dots += `<div class="cal-dot" style="background:${(SC[t.subj]||SC.all).color}"></div>`;
        }
      });
    }

    html += `<div class="${cls}" onclick="selectDay(${calYear},${calMonth},${day})">
      <div class="cal-num">${day}</div>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
  renderDayDetail();
}

function renderDayDetail() {
  const sd = selectedDate;
  const dayData = getDayData(sd);
  const dateStr = `${DAY_NAMES[sd.getDay()]}, ${sd.getDate()} ${MONTH_SHORT[sd.getMonth()]} ${sd.getFullYear()}`;
  const isExam = sd >= EXAM_START;
  const isLeave = sd >= STUDY_LEAVE_START && sd < EXAM_START;

  let phaseStr = '';
  if (isExam) phaseStr = 'Exam period';
  else if (isLeave) phaseStr = 'Study leave';
  else if (dayData) phaseStr = PHASES[dayData.phase].name + ' phase';

  let bodyHTML = '';
  if (isExam) {
    bodyHTML = `<div style="padding:1.5rem;text-align:center;">
      <div style="font-size:24px;margin-bottom:8px;">📝</div>
      <div style="color:var(--danger);font-size:14px;font-weight:600;">Exam period</div>
      <div style="color:var(--text2);font-size:12px;margin-top:4px;">Go get them, Ram!</div>
    </div>`;
  } else if (dayData && dayData.tasks.length > 0) {
    bodyHTML = dayData.tasks.map(taskHTML).join('');
  } else {
    bodyHTML = `<div style="padding:1.5rem;text-align:center;color:var(--text2);font-size:13px;">Rest day — no tasks scheduled</div>`;
  }

  document.getElementById('day-detail').innerHTML = `
    <div class="day-detail-head">
      <div class="day-detail-date">${dateStr}</div>
      ${phaseStr ? `<div class="day-detail-phase">${phaseStr}</div>` : ''}
    </div>
    ${bodyHTML}`;
}

window.calPrev = function() {
  calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
};
window.calNext = function() {
  calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
};
window.selectDay = function(y, m, d) {
  selectedDate = new Date(y, m, d);
  renderCalendar();
};

// ─── SUBJECTS VIEW ───────────────────────────────────────────────────────────

function renderSubjects() {
  const subjs = ['cs', 'physics', 'math', 'econ', 'english', 'spanish'];

  // Filter chips
  document.getElementById('subj-filter-row').innerHTML = [
    { key: 'all', label: 'All subjects' },
    ...subjs.map(s => ({ key: s, label: SC[s].label }))
  ].map(({ key, label }) => {
    const c = SC[key] || SC.all;
    const isActive = activeSubjectFilter === key;
    return `<button class="chip ${isActive ? 'active' : ''}" 
      style="${isActive ? `background:${c.color};border-color:${c.color}` : ''}"
      onclick="filterSubject('${key}')">${label}</button>`;
  }).join('');

  const filtered = activeSubjectFilter === 'all' ? subjs : [activeSubjectFilter];
  let html = '';

  filtered.forEach(s => {
    const c = SC[s];
    const days = DAYS_DATA.filter(d => d.tasks.some(t => t.subj === s));
    const totalCount = days.reduce((a, d) => a + d.tasks.filter(t => t.subj === s).length, 0);
    const doneCount = days.reduce((a, d) => a + d.tasks.filter(t => t.subj === s && checked[t.id]).length, 0);
    const isCollapsed = collapsedSubjects[s];

    html += `
      <div class="subj-section">
        <div class="subj-header ${isCollapsed ? 'collapsed' : ''}" onclick="toggleCollapse('${s}')">
          <div class="subj-header-dot" style="background:${c.color}"></div>
          <div class="subj-header-name">${c.label}</div>
          <div class="subj-header-count">${doneCount}/${totalCount} done</div>
          <div style="background:var(--bg4);border-radius:4px;height:5px;width:60px;overflow:hidden;margin-right:8px;">
            <div style="width:${totalCount>0?Math.round((doneCount/totalCount)*100):0}%;height:5px;background:${c.color};border-radius:4px;"></div>
          </div>
          <div class="subj-header-arrow">▼</div>
        </div>
        <div class="subj-body ${isCollapsed ? 'hidden' : ''}">`;

    days.forEach(day => {
      const ph = PHASES[day.phase];
      const dstr = `${DAY_SHORT[day.d.getDay()]} ${day.d.getDate()} ${MONTH_SHORT[day.d.getMonth()]}`;
      const dayTasks = day.tasks.filter(t => t.subj === s);
      html += `
        <div class="subj-day-label">
          ${dstr}
          <span style="font-size:9px;padding:1px 6px;border-radius:20px;background:${ph.color};color:${ph.text}">${ph.name}</span>
        </div>
        ${dayTasks.map(taskHTML).join('')}`;
    });

    html += `</div></div>`;
  });

  document.getElementById('subjects-content').innerHTML = html;
}

window.filterSubject = function(s) {
  activeSubjectFilter = s;
  renderSubjects();
};

window.toggleCollapse = function(s) {
  collapsedSubjects[s] = !collapsedSubjects[s];
  renderSubjects();
};

        <div class="prog-label" style="color:${c.color}">${c.label}</div>
        <div class="prog-bar-track"><div class="prog-bar-fill" style="width:${sp}%;background:${c.color}"></div></div>
        <div class="prog-pct">${sp}%</div>
      </div>`;
  });

  const phases = [
    { label: 'Foundation', idx: 0 },
    { label: 'Build',       idx: 1 },
    { label: 'Intensify',   idx: 2 },
    { label: 'Study leave', idx: 3 },
  ];
  let phaseRows = '';
  phases.forEach(ph => {
    const phTasks = DAYS_DATA.filter(d => d.phase === ph.idx).flatMap(d => d.tasks);
    const phDone = phTasks.filter(t => checked[t.id]).length;
    const phPct = phTasks.length > 0 ? Math.round((phDone / phTasks.length) * 100) : 0;
    const phColor = PHASES[ph.idx].text;
    phaseRows += `
      <div class="prog-row">
        <div class="prog-label" style="width:90px;color:${phColor};font-size:11px">${ph.label}</div>
        <div class="prog-bar-track"><div class="prog-bar-fill" style="width:${phPct}%;background:${phColor}"></div></div>
        <div class="prog-pct">${phDone}/${phTasks.length}</div>
      </div>`;
  });

  document.getElementById('prog-grid').innerHTML = `
    <div class="prog-card" style="grid-column:1/-1">
      <div class="overall-ring">
        <div class="ring-num">${pct}%</div>
        <div class="ring-label">overall completion</div>
        <div class="ring-sub">${done} of ${total} tasks done</div>
      </div>
      <div style="background:var(--bg4);border-radius:6px;height:10px;overflow:hidden;">
        <div style="width:${pct}%;height:10px;background:var(--accent);border-radius:6px;transition:width 0.5s;"></div>
      </div>
    </div>
    <div class="prog-card">
      <div class="prog-card-title">By subject</div>
      ${subjRows}
    </div>
    <div class="prog-card">
      <div class="prog-card-title">By phase</div>
      ${phaseRows}
    </div>`;
}

// ─── NAVIGATION ─────────────────────────────────────────────────────────────

window.showView = function(v, btn) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  if (btn) btn.classList.add('active');
  if (v === 'calendar') renderCalendar();
  if (v === 'subjects') renderSubjects();
  if (v === 'progress') renderProgress();
};

function renderAll() {
  renderToday();
  const active = document.querySelector('.view.active');
  if (active && active.id === 'view-calendar') renderCalendar();
  if (active && active.id === 'view-subjects') renderSubjects();
  if (active && active.id === 'view-progress') renderProgress();
}

window.toggleTask = function(id) {
  checked[id] = !checked[id];
  saveChecked();
  renderAll();
  showToast(checked[id] ? 'Task completed ✓' : 'Task unchecked');
};

// ─── INIT ───────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
