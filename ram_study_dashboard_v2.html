*{box-sizing:border-box;margin:0;padding:0;}

.view{display:none;}

.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem;}

.stat-sub{font-size:10px;color:var(--color-text-tertiary);margin-top:2px;}
.today-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:1rem;}
.today-header{padding:12px 16px;background:#EEEDFE;border-bottom:0.5px solid #AFA9EC;}
.today-title{font-size:15px;font-weight:500;color:#3C3489;}
.today-sub{font-size:11px;color:#534AB7;margin-top:2px;}
.task-row{display:flex;align-items:flex-start;gap:12px;padding:10px 16px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;transition:background 0.1s;}
.task-row:last-child{border-bottom:none;}
.task-row:hover{background:var(--color-background-secondary);}
.task-row.done .task-main{text-decoration:line-through;color:var(--color-text-tertiary);}
.chk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--color-border-secondary);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;}
.chk.checked{border-color:#534AB7;background:#534AB7;}
.chk-tick{width:8px;height:8px;display:none;}
.chk.checked .chk-tick{display:block;}
.task-body{flex:1;}
.task-main{font-size:13px;color:var(--color-text-primary);line-height:1.4;transition:all 0.2s;}
.task-note{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.subj-pill{display:inline-block;font-size:10px;padding:1px 7px;border-radius:20px;margin-right:5px;vertical-align:middle;}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;margin-bottom:1rem;}
.cal-header-cell{text-align:center;font-size:10px;color:var(--color-text-tertiary);padding:4px 0;font-weight:500;}
.cal-day{border-radius:var(--border-radius-md);padding:5px 3px;text-align:center;cursor:pointer;border:0.5px solid transparent;min-height:48px;}
.cal-day:hover{border-color:var(--color-border-secondary);}
.cal-day.today{border-color:#7F77DD;background:#EEEDFE;}
.cal-day.selected{border-color:#534AB7;background:#EEEDFE;}
.cal-day.past{opacity:0.45;}
.cal-day.exam-day{background:#FCEBEB;border-color:#F09595;}
.cal-day.study-leave{background:#FAEEDA;border-color:#EF9F27;}
.cal-day.empty{cursor:default;border:none;min-height:0;}
.cal-num{font-size:11px;font-weight:500;color:var(--color-text-primary);}
.cal-dots{display:flex;justify-content:center;gap:2px;margin-top:3px;flex-wrap:wrap;}
.cal-dot{width:5px;height:5px;border-radius:50%;}
.progress-bar-wrap{background:var(--color-background-secondary);border-radius:var(--border-radius-md);overflow:hidden;height:6px;margin-top:4px;}
.progress-bar{height:6px;border-radius:var(--border-radius-md);background:#7F77DD;transition:width 0.4s;}
.subj-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);}
.subj-row:last-child{border-bottom:none;}
.phase-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;}

.sad-overlay{display:none;position:absolute;top:0;left:0;width:100%;min-height:100%;background:var(--color-background-primary);z-index:100;padding:2rem 1rem;text-align:center;}
.sad-overlay.show{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;}
.sad-face{width:80px;height:80px;position:relative;margin:0 auto;}
</style>

const checked = {};
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();
let selectedDate = null;
let sadDismissed = false;

function getDayData(date){return allDays.find(x=>sameDay(x.d,date));}
function totalTasks(){return allDays.reduce((a,d)=>a+d.tasks.length,0);}
function doneTasks(){return Object.values(checked).filter(Boolean).length;}
function daysLeft(){return Math.max(0,Math.ceil((EXAM_START-getToday())/(1000*60*60*24)));}

function pillHTML(subj){
  const s=SC[subj]||SC.all;
  return `<span class="subj-pill" style="background:${s.pill};color:${s.pillText}">${s.label}</span>`;
}

function taskRowHTML(task){
  const done=checked[task.id]||false;
  return `<div class="task-row ${done?'done':''}" onclick="toggle('${task.id}')">
    <div class="chk ${done?'checked':''}">
      <svg class="chk-tick" viewBox="0 0 8 8" fill="none"><polyline points="1,4 3,6 7,2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="task-body">
      <div class="task-main">${pillHTML(task.subj)}${task.text}</div>
      ${task.note?`<div class="task-note">${task.note}</div>`:''}
    </div>
  </div>`;
}

function checkSadPage(){
  if(sadDismissed) return;
  const now = new Date();
  const hour = now.getHours();
  if(hour < 22) return;
  const today = getToday();
  const dayData = getDayData(today);
  if(!dayData) return;
  const unfinished = dayData.tasks.filter(t=>!checked[t.id]);
  if(unfinished.length === 0) return;
  showSadPage(unfinished);
}

function showSadPage(unfinished){
  const msgs = [
    `You had ${unfinished.length} task${unfinished.length>1?'s':''} left today and the day is over. CS isn't going to learn itself, Ram.`,
    `It's past 10pm and ${unfinished.length} thing${unfinished.length>1?'s were':' was'} left undone today. The exam date doesn't care.`,
    `Day's gone. ${unfinished.length} task${unfinished.length>1?'s':''} unfinished. You know what's at stake — let's not make this a habit.`,
  ];
  document.getElementById('sadMsg').textContent = msgs[Math.floor(Math.random()*msgs.length)];
  let uhtml = `<div style="font-size:11px;font-weight:500;color:#A32D2D;margin-bottom:8px;">Unfinished today:</div>`;
  unfinished.forEach(t=>{
    uhtml+=`<div style="display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:0.5px solid #F7C1C1;">
      <div style="width:6px;height:6px;border-radius:50%;background:#E24B4A;flex-shrink:0;margin-top:4px;"></div>
      <div style="font-size:12px;color:#791F1F;line-height:1.4;">${pillHTML(t.subj)}${t.text}</div>
    </div>`;
  });
  document.getElementById('sadUnfinished').innerHTML = uhtml;
  document.getElementById('sadPage').classList.add('show');
}

window.dismissSad = function(){
  sadDismissed = true;
  document.getElementById('sadPage').classList.remove('show');
}

window.doThemNow = function(){
  sadDismissed = true;
  document.getElementById('sadPage').classList.remove('show');
  showView('today', document.querySelector('.nvb'));
}

  const today = getToday();
  const dayData = getDayData(today);
  const done=doneTasks(), total=totalTasks();
  const pct=total>0?Math.round((done/total)*100):0;
  const days=daysLeft();

  let html=`<div class="stats-row">
    <div class="stat"><div class="stat-label">Days to exams</div><div class="stat-val">${days}</div><div class="stat-sub">May 17, 2026</div></div>
    <div class="stat"><div class="stat-label">Tasks done</div><div class="stat-val">${done}</div><div class="stat-sub">of ${total} total</div></div>
    <div class="stat"><div class="stat-label">Overall progress</div><div class="stat-val">${pct}%</div><div style="margin-top:4px;"><div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div></div></div>
    <div class="stat"><div class="stat-label">Study leave</div><div class="stat-val">May 12</div><div class="stat-sub">${Math.max(0,Math.ceil((STUDY_LEAVE-today)/(1000*60*60*24)))} days away</div></div>
  </div>`;

  const WDAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MNAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dateStr=`${WDAYS[today.getDay()]}, ${today.getDate()} ${MNAMES[today.getMonth()]} ${today.getFullYear()}`;

  if(dayData){
    const ph=PHASES[dayData.phase];
    const todayDone=dayData.tasks.filter(t=>checked[t.id]).length;
    const todayTotal=dayData.tasks.length;
    html+=`<div class="today-card">
      <div class="today-header">
        <div class="today-title">${dateStr}<span class="phase-badge" style="background:${ph.color};color:${ph.text};border:0.5px solid ${ph.border}">${ph.name}</span></div>
        <div class="today-sub">${todayDone}/${todayTotal} done today — tap to check off as you go</div>
      </div>
      ${dayData.tasks.map(taskRowHTML).join('')}
    </div>`;
  } else if(today >= EXAM_START){
    html+=`<div class="today-card"><div style="padding:1.5rem;text-align:center;"><div style="font-size:15px;font-weight:500;color:#A32D2D;margin-bottom:6px;">Exam period</div><div style="font-size:13px;color:var(--color-text-secondary);">You've done the work. Go show them what you know.</div></div></div>`;
  } else {
    html+=`<div class="today-card"><div style="padding:1.5rem;text-align:center;font-size:13px;color:var(--color-text-secondary);">No tasks today — rest up, you've earned it!</div></div>`;
  }

  const now = new Date();
  const hour = now.getHours();
  if(hour >= 20 && dayData){
    const unfinished = dayData.tasks.filter(t=>!checked[t.id]);
    if(unfinished.length > 0 && !sadDismissed){
      html+=`<div style="margin-top:8px;padding:10px 14px;border-radius:var(--border-radius-md);background:#FAEEDA;border:0.5px solid #EF9F27;font-size:12px;color:#633806;cursor:pointer;" onclick="showSadPage(getTodayUnfinished())">
        Warning: ${unfinished.length} task${unfinished.length>1?'s':''} still unfinished — day ends at midnight
      </div>`;
    }
  }

  html+=`<button onclick="sendPrompt('Help me with today\\'s study topics')" style="font-size:12px;margin-top:8px;">Ask Claude about today's topics ↗</button>`;
  document.getElementById('view-today').innerHTML=html;
}

window.getTodayUnfinished = function(){
  const today = getToday();
  const dayData = getDayData(today);
  if(!dayData) return [];
  return dayData.tasks.filter(t=>!checked[t.id]);
}

function renderCalendar(){
  const MNAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const today = getToday();
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();

  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
    <button onclick="calPrev()" style="font-size:11px;padding:3px 10px;">← prev</button>
    <span style="font-size:13px;font-weight:500;color:var(--color-text-primary);">${MNAMES[calMonth]} ${calYear}</span>
    <button onclick="calNext()" style="font-size:11px;padding:3px 10px;">next →</button>
  </div>`;

  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  html+=`<div class="cal-grid">`;
  dayNames.forEach(d=>{html+=`<div class="cal-header-cell">${d}</div>`;});
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day empty"></div>`;

  for(let day=1;day<=daysInMonth;day++){
    const date=new Date(calYear,calMonth,day);
    const dayData=getDayData(date);
    const isToday=sameDay(date,today);
    const isPast=date<today&&!isToday;
    const isExam=date>=EXAM_START;
    const isLeave=date>=STUDY_LEAVE&&date<EXAM_START;
    const isSel=selectedDate&&sameDay(date,selectedDate);

    let cls='cal-day';
    if(isExam) cls='cal-day exam-day';
    else if(isLeave) cls='cal-day study-leave';
    else if(isToday) cls+=' today';
    else if(isSel) cls+=' selected';
    if(isPast&&!isExam&&!isLeave) cls+=' past';

    let dots='';
    if(dayData){
      const seen={};
      dayData.tasks.forEach(t=>{
        if(!seen[t.subj]){seen[t.subj]=true;const c=SC[t.subj]||SC.all;dots+=`<div class="cal-dot" style="background:${c.dot}"></div>`;}
      });
    }
    html+=`<div class="${cls}" onclick="selectCalDay(${calYear},${calMonth},${day})">
      <div class="cal-num">${day}</div>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }
  html+=`</div>`;

  html+=`<div style="display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);"><div style="width:10px;height:10px;border-radius:2px;background:#EEEDFE;border:0.5px solid #7F77DD;"></div>Today</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);"><div style="width:10px;height:10px;border-radius:2px;background:#FAEEDA;border:0.5px solid #EF9F27;"></div>Study leave</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);"><div style="width:10px;height:10px;border-radius:2px;background:#FCEBEB;border:0.5px solid #F09595;"></div>Exams</div>
  </div>`;

  const sd=selectedDate||today;
  const selData=getDayData(sd);
  const WDAYS2=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MNAMES2=['Jan','Feb','Mar','Apr','May'];
  const selStr=`${WDAYS2[sd.getDay()]} ${sd.getDate()} ${MNAMES2[sd.getMonth()]||''}`;

  html+=`<div class="today-card"><div class="sel-day-header" style="padding:10px 14px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;font-weight:500;color:var(--color-text-primary);">${selStr}</div>`;
  if(selData&&selData.tasks.length>0){
    html+=selData.tasks.map(taskRowHTML).join('');
  } else if(sd>=EXAM_START){
    html+=`<div style="padding:1rem;font-size:12px;color:#A32D2D;">Exam period — go get them!</div>`;
  } else {
    html+=`<div style="padding:1rem;font-size:12px;color:var(--color-text-secondary);">Rest day — no tasks scheduled.</div>`;
  }
  html+=`</div>`;

  document.getElementById('view-calendar').innerHTML=html;
}

window.calPrev=function(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
window.calNext=function(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
window.selectCalDay=function(y,m,d){selectedDate=new Date(y,m,d);renderCalendar();}

function renderSubjects(){
  const subjs=['cs','physics','math','econ','english','spanish'];
  let html='';
  subjs.forEach(s=>{
    const c=SC[s];
    const days=allDays.filter(d=>d.tasks.some(t=>t.subj===s));
    const totalS=days.reduce((a,d)=>a+d.tasks.filter(t=>t.subj===s).length,0);
    html+=`<div style="margin-bottom:1.25rem;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div style="width:10px;height:10px;border-radius:50%;background:${c.dot};"></div>
        <span style="font-size:14px;font-weight:500;color:var(--color-text-primary);">${c.label}</span>
        <span style="font-size:11px;color:var(--color-text-secondary);">${totalS} tasks</span>
      </div>
      <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;">`;
    days.forEach(day=>{
      const MNAMES=['Jan','Feb','Mar','Apr','May'];
      const WNAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const dstr=`${WNAMES[day.d.getDay()]} ${day.d.getDate()} ${MNAMES[day.d.getMonth()]||''}`;
      const ph2=PHASES[day.phase];
      const dayTasks=day.tasks.filter(t=>t.subj===s);
      html+=`<div style="border-bottom:0.5px solid var(--color-border-tertiary);">
        <div style="padding:5px 12px;background:var(--color-background-secondary);font-size:11px;color:var(--color-text-secondary);display:flex;align-items:center;gap:6px;">
          ${dstr}<span style="font-size:9px;padding:1px 6px;border-radius:20px;background:${ph2.color};color:${ph2.text}">${ph2.name}</span>
        </div>
        ${dayTasks.map(taskRowHTML).join('')}
      </div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById('view-subjects').innerHTML=html;
}

function renderProgress(){
  const total=totalTasks(),done=doneTasks();
  const pct=total>0?Math.round((done/total)*100):0;
  let html=`<div style="margin-bottom:1.25rem;">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
      <span style="font-size:13px;font-weight:500;color:var(--color-text-primary);">Overall completion</span>
      <span style="font-size:13px;color:var(--color-text-secondary);">${done} / ${total}</span>
    </div>
    <div class="progress-bar-wrap" style="height:10px;"><div class="progress-bar" style="width:${pct}%;height:10px;"></div></div>
    <div style="font-size:11px;color:var(--color-text-secondary);margin-top:4px;">${pct}% complete</div>
  </div>`;

  const subjs=['cs','physics','math','econ','english','spanish'];
  html+=`<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:1rem;">`;
  subjs.forEach(s=>{
    const c=SC[s];
    const subjTasks=allDays.flatMap(d=>d.tasks.filter(t=>t.subj===s));
    const subjDone=subjTasks.filter(t=>checked[t.id]).length;
    const subjTotal=subjTasks.length;
    const subjPct=subjTotal>0?Math.round((subjDone/subjTotal)*100):0;
    html+=`<div class="subj-row">
      <div style="display:flex;align-items:center;gap:6px;width:70px;flex-shrink:0;font-size:12px;font-weight:500;color:var(--color-text-primary);">
        <div style="width:8px;height:8px;border-radius:50%;background:${c.dot};flex-shrink:0;"></div>${c.label}
      </div>
      <div style="flex:1;background:var(--color-background-secondary);border-radius:4px;height:8px;overflow:hidden;">
        <div style="height:8px;border-radius:4px;background:${c.dot};width:${subjPct}%;transition:width 0.3s;"></div>
      </div>
      <div style="font-size:11px;color:var(--color-text-secondary);width:40px;text-align:right;">${subjDone}/${subjTotal}</div>
    </div>`;
  });
  html+=`</div>`;

  const phaseList=[
    {label:'Phase 1 — Foundation',idx:0},
    {label:'Phase 2 — Build',idx:1},
    {label:'Phase 3 — Intensify',idx:2},
    {label:'Study leave',idx:3},
  ];
  html+=`<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;">`;
  phaseList.forEach(ph=>{
    const phColor=PHASES[ph.idx];
    const phTasks=allDays.filter(d=>d.phase===ph.idx).flatMap(d=>d.tasks);
    const phDone=phTasks.filter(t=>checked[t.id]).length;
    const phTotal=phTasks.length;
    const phPct=phTotal>0?Math.round((phDone/phTotal)*100):0;
    html+=`<div class="subj-row">
      <div style="font-size:11px;width:100px;flex-shrink:0;color:var(--color-text-primary);">${ph.label.split('—')[0].trim()}</div>
      <div style="flex:1;background:var(--color-background-secondary);border-radius:4px;height:8px;overflow:hidden;">
        <div style="height:8px;border-radius:4px;background:${phColor.text};width:${phPct}%;transition:width 0.3s;"></div>
      </div>
      <div style="font-size:11px;color:var(--color-text-secondary);width:40px;text-align:right;">${phDone}/${phTotal}</div>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('view-progress').innerHTML=html;
}

function updateClock(){
  const now=new Date();
  const MNAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const WDAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const el=document.getElementById('liveTime');
  if(el) el.textContent=`${WDAYS[now.getDay()]} ${now.getDate()} ${MNAMES[now.getMonth()]} — ${h}:${m}`;
  const cb=document.getElementById('countdown-badge');
  if(cb) cb.textContent=`${daysLeft()} days to exams`;
}

function renderAll(){
  renderToday();
  renderCalendar();
  renderSubjects();
  renderProgress();
  updateClock();
}

window.showView=function(v,btn){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('show'));
  document.querySelectorAll('.nvb').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('show');
  if(btn) btn.classList.add('active');
  else document.querySelector('.nvb').classList.add('active');
}

window.toggle=function(id){
  checked[id]=!checked[id];
  renderAll();
}

renderAll();
setInterval(()=>{updateClock();checkSadPage();renderToday();},60000);
</script>
